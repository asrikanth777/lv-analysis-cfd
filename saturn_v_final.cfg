%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 configuration file
% Case description: Inviscid flow over Saturn V launch vehicle
% Mach 1.0, h = 1 km
% Mach 2.8, h = 2.5km
% Mach 4.5, h = 5km
% Mach 6.5, h = 15km
% Mach 9.0, h = 30km
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% ------------- PROBLEM DEFINITION ------------%
SOLVER= EULER
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

% -------------------- FREE-STREAM --------------------%
AOA= 0.0
SIDESLIP_ANGLE= 0.0

% Case 1
% MACH_NUMBER= 1.0
% FREESTREAM_PRESSURE= 89875.0
% FREESTREAM_TEMPERATURE= 281.65

% Case 2
% MACH_NUMBER= 2.8
% FREESTREAM_PRESSURE= 74682.0
% FREESTREAM_TEMPERATURE= 271.91

% Case 3
% MACH_NUMBER= 4.5
% FREESTREAM_PRESSURE= 54048.0
% FREESTREAM_TEMPERATURE= 255.68

% Case 4
% MACH_NUMBER= 6.5
% FREESTREAM_PRESSURE= 12111.0
% FREESTREAM_TEMPERATURE= 216.65

% Case 5
MACH_NUMBER= 9.0
FREESTREAM_PRESSURE= 1197.0
FREESTREAM_TEMPERATURE= 226.51


% ---------------------- REFERENCE VALUES ---------------------------%
REF_ORIGIN_MOMENT_X= 0.0
REF_ORIGIN_MOMENT_Y= 0.0
REF_ORIGIN_MOMENT_Z= 0.0
REF_LENGTH= 106.7
REF_AREA= 79.17   % pi * r^2 = pi * 5.03^2

% -------------------- BOUNDARY CONDITIONS --------------------------%
MARKER_EULER= ( WALL )
MARKER_SYM= ( SYMMETRY )
MARKER_FAR= ( FARFIELD )

MARKER_PLOTTING= ( WALL )
MARKER_MONITORING= ( WALL )

% ------------- NUMERICAL METHOD ---------------%
NUM_METHOD_GRAD= GREEN_GAUSS
CFL_NUMBER= 1.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= ( 0.1, 1.2, 0.5, 30)
RK_ALPHA_COEFF= ( 0.66667, 0.66667, 1.000000 )
ITER= 999999

% ------------------------ LINEAR SOLVER --------------------------%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-5
LINEAR_SOLVER_ITER= 10

% -------------------------- MULTIGRID ----------------------------%
% Multi-Grid Levels (0 = no multi-grid)
MGLEVEL= 0
MGCYCLE= W_CYCLE
MG_PRE_SMOOTH= ( 1, 2, 3, 3 )
MG_POST_SMOOTH= ( 0, 0, 0, 0 )
MG_CORRECTION_SMOOTH= ( 0, 0, 0, 0 )
MG_DAMP_RESTRICTION= 1.0
MG_DAMP_PROLONGATION= 1.0

% -------------------- FLOW NUMERICAL METHOD -----------------------%
CONV_NUM_METHOD_FLOW= HLLC
MUSCL_FLOW= NO
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
VENKAT_LIMITER_COEFF= 0.5
LIMITER_ITER= 500
TIME_DISCRE_FLOW= EULER_IMPLICIT

% --------------------------- CONVERGENCE --------------------------%
CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -6
CONV_STARTITER= 10
CONV_CAUCHY_ELEMS= 100
CONV_CAUCHY_EPS= 1E-6

% ------------------------- INPUT/OUTPUT --------------------------%
MESH_FILENAME= saturn_v
MESH_FORMAT= SU2
MESH_OUT_FILENAME= mesh_out.su2
SOLUTION_FILENAME= restart_flow_5
TABULAR_FORMAT= CSV
CONV_FILENAME= history_5
RESTART_FILENAME= restart_flow_5
VOLUME_FILENAME= flow_5
SURFACE_FILENAME= surface_flow_5
SCREEN_OUTPUT= (INNER_ITER, RMS_DENSITY, RMS_ENERGY, DRAG)
HISTORY_OUTPUT= (ITER, RMS_RES, AERO_COEFF)